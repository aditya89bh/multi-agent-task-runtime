name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest pytest-cov coverage mypy ruff build
      - name: Run tests
        run: pytest --cov --cov-fail-under=85
      - name: Run mypy
        run: mypy .
      - name: Run Ruff lint
        run: ruff check .
      - name: Run Ruff format check
        run: ruff format --check .
      - name: Build package
        run: python -m build
      - name: Install wheel smoke test
        run: python -m pip install dist/*.whl --force-reinstall && python -c "import runtime, events, analytics"
